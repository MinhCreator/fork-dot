# ============================================================================
# Hyprlock Configuration with Music Player Widget
# ============================================================================

# ----------------------------------------------------------------------------
# Background
# ----------------------------------------------------------------------------
background {
    monitor =
    path = screenshot
    blur_passes = 3
}

# ----------------------------------------------------------------------------
# General Settings
# ----------------------------------------------------------------------------
general {
    ignore_empty_input = true
    hide_cursor = false
}

# ----------------------------------------------------------------------------
# Animations
# ----------------------------------------------------------------------------
animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

# ----------------------------------------------------------------------------
# Password Input Field
# ----------------------------------------------------------------------------
input-field {
    monitor =
    size = 250, 55
    outline_thickness = 2
    dots_size = 0.2      # Scale of input-field height (0.2 - 0.8)
    dots_spacing = 0.2   # Scale of dots' absolute size (0.0 - 1.0)
    dots_center = true
    outer_color = rgba(169, 177, 214, 1)
    inner_color = rgba(21, 22, 30, 1)
    font_color = rgba(169, 177, 214, 1)
    fade_on_empty = false
    font_family = JetBrainsMono Nerd Font Bold Italic
    placeholder_text = <span foreground="##ffffff99">...</span>
    hide_input = false
    position = 0, -153
    halign = center
    valign = center
}

# ----------------------------------------------------------------------------
# Clock & Date Display
# ----------------------------------------------------------------------------

# Time (large display)
label {
    monitor =
    text = $TIME
    color = rgba(169, 177, 214, 1)
    font_size = 100
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 260
    halign = center
    valign = center
}

# Date (day and month)
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %d %B")"
    color = rgba(169, 177, 214, 1)
    font_size = 30
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 150
    halign = center
    valign = center
}

# Lock Icon
label {
    monitor =
    text = <span> </span>
    color = rgba(169, 177, 214, 1)
    font_size = 24
    font_family = JetBrainsMono Nerd Font Bold
    position = 2, -110
    halign = center
    valign = top
}

# ----------------------------------------------------------------------------
# User Profile
# ----------------------------------------------------------------------------

# Profile photo
image {
    monitor =
    path = $HOME/Pictures/user.jpg
    border_color = rgba(169, 177, 214, 1)
    border_size = 3
    size = 160
    rounding = -1        # -1 = circle
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 0, 15
    halign = center
    valign = center
}

# Username greeting
label {
    monitor =
    text = hi, $USER
    color = rgba(169, 177, 214, 1)
    font_size = 14
    font_family = JetBrainsMono Nerd Font Italic
    position = 0, -100
    halign = center
    valign = center
}

# Keyboard layout indicator
label {
    monitor =
    text = $LAYOUT[us,ua,ru]
    font_size = 14
    color = rgba(169, 177, 214, 1)
    font_family = JetBrainsMono Nerd Font Bold
    onclick = hyprctl switchxkblayout all next

    position = 0, -206
    halign = center
    valign = center
}

# ============================================================================
# Music Player Widget
# ============================================================================

# ----------------------------------------------------------------------------
# Album Art
# ----------------------------------------------------------------------------
image {
    monitor =
    path = $HOME/.config/hypr/scripts/music.webp
    size = 100
    rounding = 5
    border_size = 0
    border_color = rgba(169, 177, 214, 1)
    rotate = 0
    reload_time = 2
    reload_cmd = ~/.config/hypr/scripts/hyprlock-music.sh --art
    position = 730, 57
    halign = left
    valign = bottom
    zindex = 1
}

# ----------------------------------------------------------------------------
# Player Background Box
# ----------------------------------------------------------------------------
shape {
    monitor =
    color = rgba(21, 22, 30, 0.1)
    size = 500, 140
    rounding = 10
    border_size = 2
    border_color = rgba(169, 177, 214, 1)
    position = 0, 40
    halign = center
    valign = bottom
    zindex = 0
}

# ----------------------------------------------------------------------------
# Track Information
# ----------------------------------------------------------------------------

# Song title
label {
    monitor =
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/hyprlock-music.sh --title)"
    color = rgba(169, 177, 214, 1)
    font_size = 14
    font_family = JetBrainsMono Nerd Font Heavy
    position = 55, 138
    halign = center
    valign = bottom
    zindex = 1
}

# Player source (e.g., Spotify, Firefox)
label {
    monitor =
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/hyprlock-music.sh --player)"
    color = rgba(169, 177, 214, 1)
    font_size = 13
    font_family = JetBrainsMono Nerd Font Bold
    position = 190, 45
    halign = center
    valign = bottom
    zindex = 1
}

# Artist name
label {
    monitor =
    text = cmd[update:1000] echo "󰠃  $(~/.config/hypr/scripts/hyprlock-music.sh --artist)"
    color = rgba(169, 177, 214, 1)
    font_size = 12
    font_family = JetBrainsMono Nerd Font Semibold
    position = 55, 118
    halign = center
    valign = bottom
    zindex = 1
}

# ----------------------------------------------------------------------------
# Playback Controls
# ----------------------------------------------------------------------------

# Previous track button
label {
    monitor =
    text = 󰒮
    color = rgba(169, 177, 214, 1)
    font_size = 25
    onclick = playerctl previous
    position = -5, 55
    halign = center
    valign = bottom
}

# Play/Pause button
label {
    monitor =
    text = cmd[update:1000] ~/.config/hypr/scripts/hyprlock-music.sh --status
    color = rgba(169, 177, 214, 1)
    font_size = 25
    onclick = playerctl play-pause
    position = 55, 55
    halign = center
    valign = bottom
}

# Next track button
label {
    monitor =
    text = 󰒭
    color = rgba(169, 177, 214, 1)
    font_size = 25
    onclick = playerctl next
    position = 110, 55
    halign = center
    valign = bottom
}

# ----------------------------------------------------------------------------
# Progress Display
# ----------------------------------------------------------------------------

# Current position timestamp
label {
    monitor = 
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/hyprlock-music.sh --position)"
    color = rgba(169, 177, 214, 1)
    font_size = 10
    font_family = SF Pro Display Medium
    position = -100, 95
    halign = center
    valign = bottom
}

# Total length timestamp
label {
    monitor = 
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/hyprlock-music.sh --length)"
    color = rgba(169, 177, 214, 1)
    font_size = 10
    font_family = SF Pro Display Medium
    position = 210, 95
    halign = center
    valign = bottom
}

# Progress bar (with Pango markup for colored segments)
label {
    monitor = 
    text = cmd[update:1000] ~/.config/hypr/scripts/hyprlock-music.sh --progress-bar
    color = rgba(169, 177, 214, 1)
    font_size = 12
    font_family = SF Pro Display Medium
    position = 55, 95
    halign = center
    valign = bottom
}

